<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activation - BlackRock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000 0%, #0a0a0a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #0a0a0a;
            border: 1px solid #00ff00;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
        }
        .auth-logo { text-align: center; margin-bottom: 30px; }
        .auth-logo .black { font-size: 32px; font-weight: 800; color: #fff; }
        .auth-logo .green { font-size: 32px; font-weight: 800; color: #00ff00; }
        h2 { text-align: center; margin-bottom: 10px; }
        p { text-align: center; color: #888; margin-bottom: 30px; }
        .activation-fee {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, #00ff00, #00cc00);
            border-radius: 10px;
            color: #000;
        }
        .activation-fee .amount { font-size: 48px; font-weight: 800; display: block; }
        .payment-instructions {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .payment-instructions h3 { color: #00ff00; margin-bottom: 15px; }
        .payment-detail {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        .payment-detail .value { color: #00ff00; font-weight: 600; }
        .ussd-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: #000;
            padding: 18px 25px;
            border-radius: 50px;
            margin: 20px 0;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            border: none;
            width: 100%;
        }
        .ussd-button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0,255,0,0.5); }
        .ussd-button code { font-size: 24px; background: transparent; color: #000; }
        .warning-box {
            background: rgba(255, 255, 0, 0.1);
            border: 1px solid #ffd700;
            border-radius: 5px;
            padding: 15px;
            margin: 20px 0;
            color: #ffd700;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #fff; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
        }
        .btn-verify {
            width: 100%;
            padding: 15px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .auth-footer { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; }
        .auth-footer a { color: #00ff00; text-decoration: none; }
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        .country-code {
            background: #00ff00;
            color: #000;
            padding: 12px 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo"><span class="black">BLACK</span><span class="green">ROCK</span></div>
            <h2>Activate Your Account</h2>
            <p>Pay 50 ZMW to start earning</p>
            <div class="activation-fee"><span class="amount">50 ZMW</span></div>

            <div class="payment-instructions">
                <h3><i class="fas fa-info-circle"></i> Payment Details</h3>
                <div class="payment-detail"><span>Network:</span><span class="value">Airtel Money</span></div>
                <div class="payment-detail"><span>Phone:</span><span class="value">0977123456</span></div>
                <div class="payment-detail"><span>Name:</span><span class="value">BlackRock Official</span></div>
                <a href="tel:*115%23" class="ussd-button"><i class="fas fa-phone-alt"></i><code>*115#</code><i class="fas fa-arrow-right"></i></a>
                <p style="text-align:center; color:#888;">Click to dial *115# and send 50 ZMW</p>
            </div>

            <div class="warning-box"><i class="fas fa-exclamation-triangle"></i> After sending money, paste confirmation message below</div>

            <form id="activationForm">
                <div class="form-group">
                    <label>Your Phone Number</label>
                    <div class="phone-input-wrapper">
                        <span class="country-code">+260</span>
                        <input type="tel" id="senderPhone" placeholder="97xxxxxxx" maxlength="9" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Transaction Message</label>
                    <textarea id="transactionMessage" rows="4" placeholder="Paste confirmation message" required></textarea>
                </div>
                <button type="submit" class="btn-verify">Verify Payment</button>
            </form>
            <div class="auth-footer"><p>Already activated? <a href="login.html">Login Here</a></p></div>
        </div>
    </div>
    <script>
        document.getElementById('activationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Activation request submitted! Wait for admin approval.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
