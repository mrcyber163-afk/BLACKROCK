<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BlackRock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #0a0a0a;
            border: 1px solid #00ff00;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
        }
        .auth-logo { text-align: center; margin-bottom: 30px; }
        .auth-logo .black { font-size: 32px; font-weight: 800; color: #ffffff; }
        .auth-logo .green { font-size: 32px; font-weight: 800; color: #00ff00; }
        h2 { text-align: center; margin-bottom: 10px; color: #ffffff; }
        p { text-align: center; color: #888888; margin-bottom: 30px; }
        .country-badge {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 30px;
            padding: 10px 20px;
            margin-bottom: 25px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #ffffff;
        }
        .country-badge i { color: #00ff00; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #ffffff; font-weight: 500; }
        .form-group label i { color: #00ff00; margin-right: 8px; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 8px;
            overflow: hidden;
        }
        .country-code {
            background: #00ff00;
            color: #000000;
            padding: 12px 15px;
            font-weight: 600;
        }
        .phone-input-wrapper input { flex: 1; border: none !important; background: #1a1a1a; }
        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888888;
        }
        .strength-bar {
            height: 4px;
            background: #333333;
            margin-top: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        .strength-fill { height: 100%; width: 0; transition: width 0.3s; }
        .strength-fill.weak { background: #ff4444; width: 25%; }
        .strength-fill.fair { background: #ffaa44; width: 50%; }
        .strength-fill.good { background: #44ff44; width: 75%; }
        .strength-fill.strong { background: #00ff00; width: 100%; }
        .strength-text { font-size: 12px; margin-top: 5px; }
        .strength-text.weak { color: #ff4444; }
        .strength-text.strong { color: #00ff00; }
        .password-requirements {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            padding: 8px;
            margin-top: 8px;
            font-size: 11px;
        }
        .password-requirements .met { color: #00ff00; }
        .password-requirements .unmet { color: #ff4444; }
        .terms { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
        .terms input[type="checkbox"] { width: 18px; height: 18px; accent-color: #00ff00; }
        .terms label { color: #888888; font-size: 14px; }
        .terms a { color: #00ff00; text-decoration: none; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #00ff00;
            border: none;
            border-radius: 8px;
            color: #000000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover { background: #00cc00; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3); }
        .auth-footer { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #333333; }
        .auth-footer a { color: #00ff00; text-decoration: none; }
        .notification-popup {
            position: fixed; top: 20px; right: 20px; background: #1a1a1a;
            border: 2px solid #00ff00; border-radius: 10px; padding: 15px 25px;
            display: flex; align-items: center; gap: 15px; z-index: 1000;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo"><span class="black">BLACK</span><span class="green">ROCK</span></div>
            <h2>Join BlackRock</h2>
            <p>Start earning by watching videos</p>
            <div class="country-badge"><i class="fas fa-map-marker-alt"></i><span>Zambia Only</span></div>

            <form id="registerForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required>
                    <div id="usernameHint" style="font-size: 12px; margin-top: 5px;"></div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone-alt"></i> Phone Number</label>
                    <div class="phone-input-wrapper">
                        <span class="country-code">+260</span>
                        <input type="tel" id="phone" placeholder="97xxxxxxx" maxlength="9" required>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-gift"></i> Referral Code (Optional)</label>
                    <input type="text" id="referral" placeholder="Enter referral code">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Create strong password" minlength="8" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                    </div>
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <div class="strength-text" id="strengthText"></div>
                    <div class="password-requirements" id="passwordRequirements">
                        <span id="reqLength" class="unmet">✗ At least 8 characters</span>
                        <span id="reqLower" class="unmet">✗ Lowercase letter</span>
                        <span id="reqUpper" class="unmet">✗ Uppercase letter</span>
                        <span id="reqNumber" class="unmet">✗ Number</span>
                        <span id="reqSpecial" class="unmet">✗ Special (@$!%*?&)</span>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
                    </div>
                </div>
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label>I agree to the <a href="#">Terms & Conditions</a></label>
                </div>
                <button type="submit" class="btn-submit" id="registerBtn">Register Now <i class="fas fa-arrow-right"></i></button>
            </form>
            <div class="auth-footer"><p>Already have an account? <a href="login.html">Login Here</a></p></div>
        </div>
    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        function checkPasswordStrength(pwd) {
            const req = {
                length: pwd.length >= 8,
                lower: /[a-z]/.test(pwd),
                upper: /[A-Z]/.test(pwd),
                number: /[0-9]/.test(pwd),
                special: /[@$!%*?&]/.test(pwd)
            };
            let met = Object.values(req).filter(Boolean).length;
            document.getElementById('reqLength').innerHTML = (req.length ? '✓' : '✗') + ' 8+ characters';
            document.getElementById('reqLength').className = req.length ? 'met' : 'unmet';
            document.getElementById('reqLower').innerHTML = (req.lower ? '✓' : '✗') + ' Lowercase';
            document.getElementById('reqLower').className = req.lower ? 'met' : 'unmet';
            document.getElementById('reqUpper').innerHTML = (req.upper ? '✓' : '✗') + ' Uppercase';
            document.getElementById('reqUpper').className = req.upper ? 'met' : 'unmet';
            document.getElementById('reqNumber').innerHTML = (req.number ? '✓' : '✗') + ' Number';
            document.getElementById('reqNumber').className = req.number ? 'met' : 'unmet';
            document.getElementById('reqSpecial').innerHTML = (req.special ? '✓' : '✗') + ' Special (@$!%*?&)';
            document.getElementById('reqSpecial').className = req.special ? 'met' : 'unmet';
            
            let strength = 0, text = '', cls = '';
            if (met <= 2) { strength = 25; text = 'Weak'; cls = 'weak'; }
            else if (met <= 3) { strength = 50; text = 'Fair'; cls = 'fair'; }
            else if (met <= 4) { strength = 75; text = 'Good'; cls = 'good'; }
            else { strength = 100; text = 'Strong'; cls = 'strong'; }
            document.getElementById('strengthFill').style.width = strength + '%';
            document.getElementById('strengthFill').className = 'strength-fill ' + cls;
            document.getElementById('strengthText').textContent = text;
            document.getElementById('strengthText').className = 'strength-text ' + cls;
            return met >= 4;
        }
        document.getElementById('password').addEventListener('input', e => checkPasswordStrength(e.target.value));
        document.getElementById('phone').addEventListener('input', e => e.target.value = e.target.value.replace(/\D/g,'').slice(0,9));
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            alert('Registration successful! Redirecting to activation...');
            window.location.href = 'activation.html';
        });
    </script>
</body>
</html>
