<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Register - BlackRock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
            margin: auto;
        }
        .auth-logo { text-align: center; margin-bottom: 30px; }
        .auth-logo .black { font-size: 32px; font-weight: 800; color: #fff; }
        .auth-logo .green { font-size: 32px; font-weight: 800; color: #0f0; }
        h2 { text-align: center; margin-bottom: 10px; }
        p { text-align: center; color: #888; margin-bottom: 30px; }
        .country-badge {
            background: rgba(0,255,0,0.1);
            border: 1px solid #0f0;
            border-radius: 30px;
            padding: 10px;
            margin-bottom: 25px;
            text-align: center;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #fff; }
        .form-group label i { color: #0f0; margin-right: 8px; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
        }
        .form-group input:focus { outline: none; border-color: #0f0; }
        .phone-input-wrapper {
            display: flex;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        .country-code {
            background: #0f0;
            color: #000;
            padding: 12px 15px;
            font-weight: 600;
        }
        .phone-input-wrapper input { flex: 1; border: none !important; }
        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
        }
        .terms { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
        .terms input { width: 18px; height: 18px; accent-color: #0f0; }
        .terms label { color: #888; font-size: 14px; }
        .terms a { color: #0f0; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #0f0;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #0c0; transform: translateY(-2px); }
        .auth-footer { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; }
        .auth-footer a { color: #0f0; text-decoration: none; }
        
        /* Modern Popup Notification */
        .custom-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .popup-content {
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 24px;
            padding: 30px 25px;
            max-width: 320px;
            width: 85%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }
        .popup-icon { font-size: 48px; margin-bottom: 15px; }
        .popup-icon.success { color: #0f0; }
        .popup-icon.error { color: #f44; }
        .popup-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .popup-message { color: #ccc; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }
        .popup-btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo"><span class="black">BLACK</span><span class="green">ROCK</span></div>
        <h2>Join BlackRock</h2>
        <p>Start earning by watching videos</p>
        <div class="country-badge"><i class="fas fa-map-marker-alt"></i> Zambia Only</div>

        <form id="registerForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" placeholder="Choose username" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Phone</label>
                <div class="phone-input-wrapper">
                    <span class="country-code">+260</span>
                    <input type="tel" id="phone" placeholder="97xxxxxxx" maxlength="9" required>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-gift"></i> Referral Code (Optional)</label>
                <input type="text" id="referral" placeholder="Enter code">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Min 4 characters" minlength="4" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
                </div>
            </div>
            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label>I agree to <a href="#">Terms & Conditions</a></label>
            </div>
            <button type="submit" class="btn-submit" id="registerBtn">Register Now <i class="fas fa-arrow-right"></i></button>
        </form>
        <div class="auth-footer"><p>Already have an account? <a href="login.html">Login</a></p></div>
    </div>

    <script type="module">
        import { auth, db, createUserWithEmailAndPassword, doc, setDoc, collection, query, where, getDocs } from './assets/js/firebase-config.js';

        function showPopup(title, message, type = 'success') {
            const existing = document.querySelector('.custom-popup');
            if (existing) existing.remove();
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
            const colors = { success: '#0f0', error: '#f44', warning: '#ff0' };
            const popup = document.createElement('div');
            popup.className = 'custom-popup';
            popup.innerHTML = `
                <div class="popup-content">
                    <div class="popup-icon ${type}"><i class="fas ${icons[type]}" style="color: ${colors[type]}"></i></div>
                    <div class="popup-title">${title}</div>
                    <div class="popup-message">${message}</div>
                    <button class="popup-btn" onclick="this.closest('.custom-popup').remove()">OK</button>
                </div>
            `;
            document.body.appendChild(popup);
        }

        window.togglePassword = function(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        };

        document.getElementById('phone').addEventListener('input', e => e.target.value = e.target.value.replace(/\D/g,'').slice(0,9));

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const referralCode = document.getElementById('referral').value.trim();
            
            if (!phone.match(/^[97][0-9]{8}$/)) { showPopup('Invalid Phone', 'Enter valid Zambian phone (97xxxxxxx)', 'error'); return; }
            if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) { showPopup('Invalid Email', 'Enter a valid email address', 'error'); return; }
            if (username.length < 3) { showPopup('Username Too Short', 'Username must be at least 3 characters', 'error'); return; }
            if (password.length < 4) { showPopup('Password Too Short', 'Password must be at least 4 characters', 'error'); return; }
            if (password !== confirm) { showPopup('Password Mismatch', 'Passwords do not match', 'error'); return; }
            if (!document.getElementById('terms').checked) { showPopup('Terms Required', 'You must agree to the terms', 'error'); return; }
            
            const btn = document.getElementById('registerBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            
            try {
                const usersRef = collection(db, 'users');
                const emailCheck = await getDocs(query(usersRef, where('email', '==', email)));
                if (!emailCheck.empty) throw new Error('Email already registered');
                const phoneCheck = await getDocs(query(usersRef, where('phone', '==', '+260'+phone)));
                if (!phoneCheck.empty) throw new Error('Phone already registered');
                
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCred.user;
                const userReferralCode = username.slice(0,3).toUpperCase() + Math.floor(Math.random()*10000).toString().padStart(4,'0');
                
                await setDoc(doc(db, 'users', user.uid), {
                    uid: user.uid, username, email, phone: '+260'+phone, country: 'Zambia',
                    referralCode: userReferralCode, referredBy: referralCode || null,
                    balance: 0, totalEarned: 0, totalTasks: 0, status: 'pending_activation',
                    role: 'user', level: 'VIP 1', createdAt: new Date().toISOString()
                });
                
                localStorage.setItem('pendingUserId', user.uid);
                showPopup('Registration Successful!', 'Your account has been created. Redirecting to activation page...', 'success');
                setTimeout(() => { window.location.href = 'activation.html'; }, 2000);
            } catch (err) { 
                let msg = err.message || 'Registration failed';
                if (err.code === 'auth/email-already-in-use') msg = 'Email already in use';
                showPopup('Registration Failed', msg, 'error');
                btn.disabled = false; btn.innerHTML = 'Register Now <i class="fas fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
