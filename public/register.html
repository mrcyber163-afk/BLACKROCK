<!-- public/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BlackRock</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .country-badge {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 30px;
            padding: 10px 20px;
            margin-bottom: 25px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .country-badge i {
            color: #00ff00;
        }
        
        .password-strength {
            margin-top: 5px;
            font-size: 12px;
        }
        
        .strength-bar {
            height: 3px;
            background: #333;
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            width: 0;
            transition: width 0.3s;
        }
        
        .strength-fill.weak { background: #ff4444; width: 33%; }
        .strength-fill.medium { background: #ffd700; width: 66%; }
        .strength-fill.strong { background: #00ff00; width: 100%; }
        
        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .terms input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00ff00;
        }
        
        .terms label {
            color: #888;
            font-size: 14px;
        }
        
        .terms a {
            color: #00ff00;
            text-decoration: none;
        }
        
        .referral-info {
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #333;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
            font-size: 13px;
            color: #888;
        }
        
        .referral-info i {
            color: #00ff00;
            margin-right: 5px;
        }

        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        .country-code {
            background: #00ff00;
            color: #000;
            padding: 12px 15px;
            font-weight: 600;
        }

        .phone-input-wrapper input {
            flex: 1;
            border: none !important;
            background: #1a1a1a;
            color: #fff;
            padding: 12px 15px;
        }

        .phone-input-wrapper input:focus {
            outline: none;
        }

        .form-hint {
            display: block;
            margin-top: 5px;
            color: #888;
            font-size: 12px;
        }

        .form-hint i {
            color: #00ff00;
            margin-right: 5px;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <span class="black">BLACK</span><span class="green">ROCK</span>
            </div>
            
            <h2>Join BlackRock</h2>
            <p>Start earning by watching videos</p>

            <!-- Country Badge (Zambia Only) -->
            <div class="country-badge">
                <i class="fas fa-map-marker-alt"></i>
                <span>Zambia Only</span>
            </div>

            <!-- Registration Form -->
            <form id="registerForm">
                <!-- Username -->
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Choose a username"
                        required
                    >
                    <div id="usernameHint" class="password-strength"></div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your@email.com"
                        required
                    >
                </div>

                <!-- Phone Number -->
                <div class="form-group">
                    <label for="phone">
                        <i class="fas fa-phone-alt"></i>
                        Phone Number
                    </label>
                    <div class="phone-input-wrapper">
                        <span class="country-code">+260</span>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            placeholder="97xxxxxxx"
                            maxlength="9"
                            required
                        >
                    </div>
                    <small class="form-hint">
                        <i class="fas fa-info-circle"></i> 
                        Enter 9 digits (e.g., 977123456)
                    </small>
                </div>

                <!-- Referral Code (Optional) -->
                <div class="form-group">
                    <label for="referral">
                        <i class="fas fa-gift"></i>
                        Referral Code (Optional)
                    </label>
                    <input 
                        type="text" 
                        id="referral" 
                        name="referral" 
                        placeholder="Enter referral code if you have"
                    >
                </div>

                <!-- Referral Info -->
                <div class="referral-info">
                    <i class="fas fa-info-circle"></i>
                    Using a referral code gives you 5 ZMW bonus after activation!
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Minimum 6 characters"
                            minlength="6"
                            required
                        >
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                    </div>
                    <div class="password-strength" id="passwordStrength"></div>
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-lock"></i>
                        Confirm Password
                    </label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Re-enter password"
                            required
                        >
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
                    </div>
                </div>

                <!-- Terms -->
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit" id="registerBtn">
                    Register Now <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Login Link -->
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login Here</a></p>
            </div>
        </div>
    </div>

        <script type="module">
        import { handleRegistration, showNotification } from './assets/js/register.js';
        import { collection, query, where, getDocs, db } from './assets/js/firebase-config.js';

        // Toggle password visibility
        window.togglePassword = function(inputId) {
            const input = document.getElementById(inputId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            
            const icon = input.nextElementSibling;
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        };

        // Password strength checker
        document.getElementById('password').addEventListener('input', function(e) {
            const password = e.target.value;
            const strengthText = document.getElementById('passwordStrength');
            const strengthFill = document.getElementById('strengthFill');
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;
            
            if (password.length === 0) {
                strengthText.textContent = '';
                strengthFill.className = 'strength-fill';
            } else if (strength < 2) {
                strengthText.textContent = 'Weak';
                strengthFill.className = 'strength-fill weak';
            } else if (strength < 4) {
                strengthText.textContent = 'Medium';
                strengthFill.className = 'strength-fill medium';
            } else {
                strengthText.textContent = 'Strong';
                strengthFill.className = 'strength-fill strong';
            }
        });

        // Phone number formatting
        document.getElementById('phone').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '').slice(0, 9);
        });

        // Check username availability
        let usernameTimeout;
        document.getElementById('username').addEventListener('input', function(e) {
            clearTimeout(usernameTimeout);
            const username = e.target.value;
            const hint = document.getElementById('usernameHint');
            
            if (username.length < 3) {
                hint.innerHTML = 'Username must be at least 3 characters';
                hint.style.color = '#ff4444';
                return;
            }
            
            usernameTimeout = setTimeout(async () => {
                try {
                    const usersRef = collection(db, 'users');
                    const q = query(usersRef, where('username', '==', username));
                    const snapshot = await getDocs(q);
                    
                    if (snapshot.empty) {
                        hint.innerHTML = '<i class="fas fa-check" style="color: #00ff00;"></i> Username available';
                        hint.style.color = '#00ff00';
                    } else {
                        hint.innerHTML = '<i class="fas fa-times" style="color: #ff4444;"></i> Username taken';
                        hint.style.color = '#ff4444';
                    }
                } catch (error) {
                    console.error('Error checking username:', error);
                }
            }, 500);
        });

        // Handle registration
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const registerBtn = document.getElementById('registerBtn');
            
            const formData = {
                username: document.getElementById('username').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value,
                referralCode: document.getElementById('referral').value.trim(),
                terms: document.getElementById('terms').checked
            };
            
            // Check password match
            if (formData.password !== formData.confirmPassword) {
                showNotification('Passwords do not match', 'error');
                return;
            }
            
            // Disable button
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            
            const success = await handleRegistration(formData);
            
            if (!success) {
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Register Now <i class="fas fa-arrow-right"></i>';
            }
        });

        // Get referral from URL
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');
        if (ref) {
            document.getElementById('referral').value = ref;
        }
    </script>
</body>
</html>
