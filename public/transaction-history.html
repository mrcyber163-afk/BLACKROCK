<!-- public/transaction-history.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - BlackRock</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .history-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        
        .tab-btn {
            background: transparent;
            border: none;
            color: #888;
            font-size: 16px;
            font-weight: 600;
            padding: 8px 20px;
            cursor: pointer;
            position: relative;
        }
        
        .tab-btn.active {
            color: #00ff00;
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 0;
            right: 0;
            height: 2px;
            background: #00ff00;
        }
        
        .transactions-list {
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
        }
        
        .transaction-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
            transition: background 0.3s;
        }
        
        .transaction-item:hover {
            background: rgba(0, 255, 0, 0.05);
        }
        
        .transaction-item:last-child {
            border-bottom: none;
        }
        
        .transaction-icon {
            width: 40px;
            height: 40px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }
        
        .transaction-icon i {
            font-size: 18px;
            color: #00ff00;
        }
        
        .transaction-details {
            flex: 1;
        }
        
        .transaction-title {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .transaction-date {
            font-size: 12px;
            color: #888;
        }
        
        .transaction-amount {
            font-size: 18px;
            font-weight: 700;
        }
        
        .transaction-amount.positive {
            color: #00ff00;
        }
        
        .transaction-amount.negative {
            color: #ff4444;
        }
        
        .transaction-status {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 3px;
            margin-left: 15px;
        }
        
        .status-completed {
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
        }
        
        .status-pending {
            background: rgba(255, 255, 0, 0.1);
            color: #ffd700;
        }
        
        .status-failed {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4444;
        }
        
        .no-transactions {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        
        .no-transactions i {
            font-size: 50px;
            margin-bottom: 15px;
            color: #333;
        }
        
        .filter-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .date-filter {
            display: flex;
            gap: 10px;
        }
        
        .date-filter input {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <span class="black">BLACK</span><span class="green">ROCK</span>
            </div>
            
            <nav class="nav-menu">
                <a href="dashboard.html">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="tasks.html">
                    <i class="fas fa-tasks"></i>
                    <span>Tasks</span>
                </a>
                <a href="deposit.html">
                    <i class="fas fa-plus-circle"></i>
                    <span>Deposit</span>
                </a>
                <a href="withdraw.html">
                    <i class="fas fa-wallet"></i>
                    <span>Withdraw</span>
                </a>
                <a href="transaction-history.html" class="active">
                    <i class="fas fa-history"></i>
                    <span>History</span>
                </a>
                <a href="referral.html">
                    <i class="fas fa-users"></i>
                    <span>Referrals</span>
                </a>
                <a href="investment.html">
                    <i class="fas fa-chart-line"></i>
                    <span>Wealth Fund</span>
                </a>
                <a href="profile.html">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
                <a href="welcome-bonus.html">
                    <i class="fas fa-gift"></i>
                    <span>Welcome Bonus</span>
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="dashboard-header">
                <div class="greeting">
                    <h2>Transaction History</h2>
                    <p>View all your transactions</p>
                </div>
                <div class="header-actions">
                    <div class="notification-bell" onclick="showNotifications()">
                        <i class="fas fa-bell"></i>
                        <span class="badge notification-badge">3</span>
                    </div>
                    <div class="user-balance">
                        <span>Balance:</span>
                        <strong id="balance">0 ZMW</strong>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="history-tabs">
                <button class="tab-btn active" onclick="switchTab('all')" id="tab-all">All</button>
                <button class="tab-btn" onclick="switchTab('deposit')" id="tab-deposit">Deposits</button>
                <button class="tab-btn" onclick="switchTab('withdraw')" id="tab-withdraw">Withdrawals</button>
                <button class="tab-btn" onclick="switchTab('task')" id="tab-task">Task Earnings</button>
                <button class="tab-btn" onclick="switchTab('bonus')" id="tab-bonus">Bonuses</button>
            </div>

            <!-- Filter Section -->
            <div class="filter-section">
                <div class="date-filter">
                    <input type="date" id="startDate" onchange="filterTransactions()">
                    <span>to</span>
                    <input type="date" id="endDate" onchange="filterTransactions()">
                </div>
                <button class="btn-outline" onclick="exportTransactions()">
                    <i class="fas fa-download"></i> Export
                </button>
            </div>

            <!-- Transactions List -->
            <div id="transactionsList" class="transactions-list">
                <!-- Transactions will be loaded here -->
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>Loading transactions...</span>
                </div>
            </div>
        </div>

        <!-- Mobile Bottom Navigation -->
        <div class="mobile-nav">
            <a href="dashboard.html">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="tasks.html">
                <i class="fas fa-tasks"></i>
                <span>Tasks</span>
            </a>
            <a href="deposit.html">
                <i class="fas fa-plus-circle"></i>
                <span>Deposit</span>
            </a>
            <a href="withdraw.html">
                <i class="fas fa-wallet"></i>
                <span>Withdraw</span>
            </a>
            <a href="transaction-history.html" class="active">
                <i class="fas fa-history"></i>
                <span>History</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, doc, getDoc, collection, query, where, getDocs, orderBy, limit } from './assets/js/firebase-config.js';

        let currentUser = null;
        let userData = null;
        let currentTab = 'all';
        let allTransactions = [];

        // Check authentication
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData();
                loadAllTransactions();
            } else {
                window.location.href = 'login.html';
            }
        });

        // Load user data
        async function loadUserData() {
            try {
                const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
                if (userDoc.exists()) {
                    userData = userDoc.data();
                    document.getElementById('balance').textContent = `${userData.balance || 0} ZMW`;
                }
            } catch (error) {
                console.error('Error loading user:', error);
            }
        }

        // Load all transactions
        async function loadAllTransactions() {
            allTransactions = [];
            
            try {
                // Load deposits
                const depositsRef = collection(db, 'users', currentUser.uid, 'deposits');
                const depositsQuery = query(depositsRef, orderBy('createdAt', 'desc'));
                const depositsSnap = await getDocs(depositsQuery);
                depositsSnap.forEach(doc => {
                    allTransactions.push({
                        id: doc.id,
                        type: 'deposit',
                        ...doc.data()
                    });
                });
                
                // Load withdrawals
                const withdrawalsRef = collection(db, 'users', currentUser.uid, 'withdrawals');
                const withdrawalsQuery = query(withdrawalsRef, orderBy('createdAt', 'desc'));
                const withdrawalsSnap = await getDocs(withdrawalsQuery);
                withdrawalsSnap.forEach(doc => {
                    allTransactions.push({
                        id: doc.id,
                        type: 'withdraw',
                        ...doc.data()
                    });
                });
                
                // Load task history
                const tasksRef = collection(db, 'users', currentUser.uid, 'task-history');
                const tasksQuery = query(tasksRef, orderBy('completedAt', 'desc'));
                const tasksSnap = await getDocs(tasksQuery);
                tasksSnap.forEach(doc => {
                    allTransactions.push({
                        id: doc.id,
                        type: 'task',
                        ...doc.data()
                    });
                });
                
                // Sort all by date
                allTransactions.sort((a, b) => {
                    const dateA = new Date(a.createdAt || a.completedAt || 0);
                    const dateB = new Date(b.createdAt || b.completedAt || 0);
                    return dateB - dateA;
                });
                
                displayTransactions();
                
            } catch (error) {
                console.error('Error loading transactions:', error);
                showMockTransactions();
            }
        }

        // Show mock transactions (for demo)
        function showMockTransactions() {
            allTransactions = [
                {
                    type: 'deposit',
                    amount: 150,
                    status: 'completed',
                    createdAt: new Date().toISOString(),
                    paymentMethod: 'Airtel Money'
                },
                {
                    type: 'task',
                    reward: 2,
                    platform: 'tiktok',
                    completedAt: new Date(Date.now() - 86400000).toISOString()
                },
                {
                    type: 'withdraw',
                    amount: 50,
                    status: 'pending',
                    createdAt: new Date(Date.now() - 172800000).toISOString()
                },
                {
                    type: 'bonus',
                    amount: 100,
                    description: 'Welcome Bonus',
                    createdAt: new Date(Date.now() - 259200000).toISOString()
                }
            ];
            displayTransactions();
        }

        // Display transactions
        function displayTransactions() {
            const container = document.getElementById('transactionsList');
            
            let filtered = allTransactions;
            if (currentTab !== 'all') {
                filtered = allTransactions.filter(t => t.type === currentTab);
            }
            
            // Apply date filter
            const startDate = document.getElementById('startDate')?.value;
            const endDate = document.getElementById('endDate')?.value;
            
            if (startDate && endDate) {
                filtered = filtered.filter(t => {
                    const date = new Date(t.createdAt || t.completedAt || 0);
                    return date >= new Date(startDate) && date <= new Date(endDate);
                });
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="no-transactions">
                        <i class="fas fa-history"></i>
                        <h3>No Transactions Found</h3>
                        <p>Your transactions will appear here</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filtered.map(t => {
                if (t.type === 'deposit') {
                    return `
                        <div class="transaction-item">
                            <div class="transaction-icon">
                                <i class="fas fa-arrow-down"></i>
                            </div>
                            <div class="transaction-details">
                                <div class="transaction-title">Deposit via ${t.paymentMethod || 'Mobile Money'}</div>
                                <div class="transaction-date">${formatDate(t.createdAt)}</div>
                            </div>
                            <div class="transaction-amount positive">+${t.amount} ZMW</div>
                            <div class="transaction-status status-${t.status || 'completed'}">${t.status || 'completed'}</div>
                        </div>
                    `;
                } else if (t.type === 'withdraw') {
                    return `
                        <div class="transaction-item">
                            <div class="transaction-icon">
                                <i class="fas fa-arrow-up"></i>
                            </div>
                            <div class="transaction-details">
                                <div class="transaction-title">Withdrawal to ${t.network || 'Mobile Money'}</div>
                                <div class="transaction-date">${formatDate(t.createdAt)}</div>
                            </div>
                            <div class="transaction-amount negative">-${t.amount} ZMW</div>
                            <div class="transaction-status status-${t.status || 'pending'}">${t.status || 'pending'}</div>
                        </div>
                    `;
                } else if (t.type === 'task') {
                    return `
                        <div class="transaction-item">
                            <div class="transaction-icon">
                                <i class="fab fa-${t.platform || 'tiktok'}"></i>
                            </div>
                            <div class="transaction-details">
                                <div class="transaction-title">Task Completed (${t.platform || 'video'})</div>
                                <div class="transaction-date">${formatDate(t.completedAt)}</div>
                            </div>
                            <div class="transaction-amount positive">+${t.reward} ZMW</div>
                            <div class="transaction-status status-completed">completed</div>
                        </div>
                    `;
                } else if (t.type === 'bonus') {
                    return `
                        <div class="transaction-item">
                            <div class="transaction-icon">
                                <i class="fas fa-gift"></i>
                            </div>
                            <div class="transaction-details">
                                <div class="transaction-title">${t.description || 'Bonus'}</div>
                                <div class="transaction-date">${formatDate(t.createdAt)}</div>
                            </div>
                            <div class="transaction-amount positive">+${t.amount} ZMW</div>
                            <div class="transaction-status status-completed">completed</div>
                        </div>
                    `;
                }
            }).join('');
        }

        // Switch tab
        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            displayTransactions();
        };

        // Filter by date
        window.filterTransactions = function() {
            displayTransactions();
        };

        // Export transactions
        window.exportTransactions = function() {
            let csv = 'Type,Amount,Date,Status\n';
            
            allTransactions.forEach(t => {
                if (t.type === 'deposit') {
                    csv += `Deposit,${t.amount},${t.createdAt},${t.status}\n`;
                } else if (t.type === 'withdraw') {
                    csv += `Withdrawal,${t.amount},${t.createdAt},${t.status}\n`;
                } else if (t.type === 'task') {
                    csv += `Task,${t.reward},${t.completedAt},completed\n`;
                } else if (t.type === 'bonus') {
                    csv += `Bonus,${t.amount},${t.createdAt},completed\n`;
                }
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `transactions-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        };

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-ZM', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Show notifications
        window.showNotifications = function() {
            alert('Notifications panel - Coming soon');
        };
    </script>
</body>
</html>
