<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Activation - BlackRock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
            margin: auto;
        }
        .auth-logo { text-align: center; margin-bottom: 30px; }
        .auth-logo .black { font-size: 32px; font-weight: 800; color: #fff; }
        .auth-logo .green { font-size: 32px; font-weight: 800; color: #0f0; }
        h2 { text-align: center; margin-bottom: 10px; }
        p { text-align: center; color: #888; margin-bottom: 30px; }
        .activation-fee {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, #0f0, #0c0);
            border-radius: 10px;
            color: #000;
        }
        .activation-fee .amount { font-size: 48px; font-weight: 800; display: block; }
        .payment-instructions {
            background: rgba(0,255,0,0.1);
            border: 1px solid #0f0;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .payment-instructions h3 { color: #0f0; margin-bottom: 15px; }
        .payment-detail {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
            gap: 10px;
        }
        .payment-detail .value { color: #0f0; font-weight: 600; }
        .ussd-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: linear-gradient(135deg, #0f0, #0c0);
            color: #000;
            padding: 18px 25px;
            border-radius: 50px;
            margin: 20px 0;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            width: 100%;
        }
        .ussd-button:hover { transform: scale(1.02); }
        .ussd-button code { font-size: 24px; background: transparent; color: #000; }
        .warning-box {
            background: rgba(255,255,0,0.1);
            border: 1px solid #ff0;
            border-radius: 5px;
            padding: 15px;
            margin: 20px 0;
            color: #ff0;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #fff; }
        .form-group label i { color: #0f0; margin-right: 8px; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
        }
        .phone-input-wrapper {
            display: flex;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        .country-code {
            background: #0f0;
            color: #000;
            padding: 12px 15px;
            font-weight: 600;
        }
        .btn-verify {
            width: 100%;
            padding: 15px;
            background: #0f0;
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-verify:hover { background: #0c0; transform: translateY(-2px); }
        .auth-footer { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; }
        .auth-footer a { color: #0f0; text-decoration: none; }
        
        .custom-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .popup-content {
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 24px;
            padding: 30px 25px;
            max-width: 320px;
            width: 85%;
            text-align: center;
        }
        .popup-icon { font-size: 48px; margin-bottom: 15px; }
        .popup-icon.success { color: #0f0; }
        .popup-icon.error { color: #f44; }
        .popup-btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        
        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
            .payment-detail { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo"><span class="black">BLACK</span><span class="green">ROCK</span></div>
        <h2>Activate Your Account</h2>
        <p>Pay 50 ZMW to start earning</p>
        
        <div class="activation-fee"><span class="amount">50 ZMW</span></div>

        <div class="payment-instructions">
            <h3><i class="fas fa-info-circle"></i> Payment Details</h3>
            <div class="payment-detail"><span>Network:</span><span class="value">Airtel Money / MTN Money</span></div>
            <div class="payment-detail"><span>Phone:</span><span class="value">0977123456</span></div>
            <div class="payment-detail"><span>Name:</span><span class="value">BlackRock Official</span></div>
            <a href="tel:*115%23" class="ussd-button"><i class="fas fa-phone-alt"></i><code>*115#</code><i class="fas fa-arrow-right"></i></a>
            <p style="text-align:center; color:#888;">Click to dial *115# and send 50 ZMW</p>
        </div>

        <div class="warning-box"><i class="fas fa-exclamation-triangle"></i> After sending money, paste confirmation message below</div>

        <form id="activationForm">
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Your Phone Number</label>
                <div class="phone-input-wrapper">
                    <span class="country-code">+260</span>
                    <input type="tel" id="senderPhone" placeholder="97xxxxxxx" maxlength="9" required>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-comment"></i> Transaction Message</label>
                <textarea id="transactionMessage" rows="4" placeholder="Paste confirmation message here" required></textarea>
            </div>
            <button type="submit" class="btn-verify" id="submitBtn">Verify Payment</button>
        </form>
        <div class="auth-footer"><p>Already activated? <a href="login.html">Login Here</a></p></div>
    </div>

    <script type="module">
        import { db, collection, addDoc, query, where, getDocs } from './assets/js/firebase-config.js';

        function showPopup(title, message, type = 'success') {
            const existing = document.querySelector('.custom-popup');
            if (existing) existing.remove();
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
            const colors = { success: '#0f0', error: '#f44', warning: '#ff0' };
            const popup = document.createElement('div');
            popup.className = 'custom-popup';
            popup.innerHTML = `
                <div class="popup-content">
                    <div class="popup-icon ${type}"><i class="fas ${icons[type]}" style="color: ${colors[type]}"></i></div>
                    <div class="popup-title">${title}</div>
                    <div class="popup-message" style="color:#ccc; margin:15px 0;">${message}</div>
                    <button class="popup-btn" onclick="this.closest('.custom-popup').remove()">OK</button>
                </div>
            `;
            document.body.appendChild(popup);
        }

        const pendingUserId = localStorage.getItem('pendingUserId');
        if (!pendingUserId) {
            showPopup('No Pending Activation', 'Please register first', 'error');
            setTimeout(() => { window.location.href = 'register.html'; }, 2000);
        }

        document.getElementById('senderPhone').addEventListener('input', e => e.target.value = e.target.value.replace(/\D/g,'').slice(0,9));

        document.getElementById('activationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const senderPhone = document.getElementById('senderPhone').value;
            const message = document.getElementById('transactionMessage').value;
            const btn = document.getElementById('submitBtn');
            
            if (!senderPhone.match(/^[97][0-9]{8}$/)) { showPopup('Invalid Phone', 'Enter valid Zambian phone (97xxxxxxx)', 'error'); return; }
            if (!message.trim()) { showPopup('Missing Message', 'Please paste transaction message', 'error'); return; }
            
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
            
            try {
                const activationsRef = collection(db, 'activations');
                const existing = await getDocs(query(activationsRef, where('userId', '==', pendingUserId), where('status', '==', 'pending')));
                if (!existing.empty) {
                    showPopup('Request Already Sent', 'You already have a pending activation request. Please wait for admin approval.', 'warning');
                    btn.disabled = false; btn.innerHTML = 'Verify Payment';
                    return;
                }
                
                await addDoc(activationsRef, {
                    userId: pendingUserId,
                    senderPhone: '+260' + senderPhone,
                    transactionMessage: message,
                    amount: 50,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                });
                
                localStorage.removeItem('pendingUserId');
                showPopup('Request Submitted!', 'Activation request submitted. Redirecting to login...', 'success');
                setTimeout(() => { window.location.href = 'login.html'; }, 2500);
            } catch (err) {
                showPopup('Submission Failed', 'Please try again', 'error');
                btn.disabled = false; btn.innerHTML = 'Verify Payment';
            }
        });
    </script>
</body>
</html>
