<!-- public/tasks.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - BlackRock</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .platform-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: transparent;
            border: 1px solid #333;
            color: #888;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            border-color: #00ff00;
            color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }
        
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .task-card {
            background: linear-gradient(135deg, #1a1a1a, #000);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .task-card:hover {
            transform: translateY(-5px);
            border-color: #00ff00;
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.2);
        }
        
        .task-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .task-header i {
            font-size: 30px;
        }
        
        .task-header i.tiktok { color: #00f2ea; }
        .task-header i.facebook { color: #1877f2; }
        .task-header i.youtube { color: #ff0000; }
        .task-header i.instagram { color: #e4405f; }
        
        .task-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .task-description {
            color: #888;
            font-size: 14px;
            margin: 15px 0;
        }
        
        .task-requirements {
            background: rgba(0, 255, 0, 0.05);
            border-radius: 5px;
            padding: 10px;
            margin: 15px 0;
            font-size: 13px;
        }
        
        .task-requirements i {
            color: #00ff00;
            margin-right: 5px;
        }
        
        .task-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        
        .task-reward {
            color: #00ff00;
            font-size: 20px;
            font-weight: 700;
        }
        
        .btn-start {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-start:hover {
            background: #00ff00;
            color: #000;
        }
        
        .btn-start.completed {
            background: #00ff00;
            color: #000;
            border-color: #00ff00;
            cursor: default;
        }
        
        .daily-limit {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
        
        .no-tasks {
            text-align: center;
            padding: 50px;
            color: #888;
            grid-column: 1 / -1;
        }
        
        .no-tasks i {
            font-size: 50px;
            margin-bottom: 15px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <span class="black">BLACK</span><span class="green">ROCK</span>
            </div>
            
            <nav class="nav-menu">
                <a href="dashboard.html">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="tasks.html" class="active">
                    <i class="fas fa-tasks"></i>
                    <span>Tasks</span>
                </a>
                <a href="deposit.html">
                    <i class="fas fa-plus-circle"></i>
                    <span>Deposit</span>
                </a>
                <a href="withdraw.html">
                    <i class="fas fa-wallet"></i>
                    <span>Withdraw</span>
                </a>
                <a href="transaction-history.html">
                    <i class="fas fa-history"></i>
                    <span>History</span>
                </a>
                <a href="referral.html">
                    <i class="fas fa-users"></i>
                    <span>Referrals</span>
                </a>
                <a href="investment.html">
                    <i class="fas fa-chart-line"></i>
                    <span>Wealth Fund</span>
                </a>
                <a href="profile.html">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
                <a href="welcome-bonus.html">
                    <i class="fas fa-gift"></i>
                    <span>Welcome Bonus</span>
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="dashboard-header">
                <div class="greeting">
                    <h2>Available Tasks</h2>
                    <p>Complete tasks and earn money</p>
                </div>
                <div class="header-actions">
                    <div class="notification-bell" onclick="showNotifications()">
                        <i class="fas fa-bell"></i>
                        <span class="badge notification-badge">3</span>
                    </div>
                    <div class="user-balance">
                        <span>Balance:</span>
                        <strong id="balance">0 ZMW</strong>
                    </div>
                </div>
            </div>

            <!-- Admin Notification -->
            <div class="admin-notification">
                <i class="fas fa-bullhorn"></i>
                <marquee behavior="scroll" direction="left" id="notificationMarquee">
                    🔥 Today's Task: Complete 10 videos to earn bonus!
                </marquee>
            </div>

            <!-- Tasks Header -->
            <div class="tasks-header">
                <h3>Today's Tasks</h3>
                <div class="platform-filter">
                    <button class="filter-btn active" data-platform="all">All</button>
                    <button class="filter-btn" data-platform="tiktok">TikTok</button>
                    <button class="filter-btn" data-platform="facebook">Facebook</button>
                    <button class="filter-btn" data-platform="youtube">YouTube</button>
                    <button class="filter-btn" data-platform="instagram">Instagram</button>
                </div>
            </div>

            <!-- Tasks Grid -->
            <div id="tasksContainer" class="tasks-grid">
                <!-- Tasks will be loaded here -->
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>Loading tasks...</span>
                </div>
            </div>
        </div>

        <!-- Mobile Bottom Navigation -->
        <div class="mobile-nav">
            <a href="dashboard.html">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="tasks.html" class="active">
                <i class="fas fa-tasks"></i>
                <span>Tasks</span>
            </a>
            <a href="deposit.html">
                <i class="fas fa-plus-circle"></i>
                <span>Deposit</span>
            </a>
            <a href="withdraw.html">
                <i class="fas fa-wallet"></i>
                <span>Withdraw</span>
            </a>
            <a href="profile.html">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { auth, db, rtdb, onAuthStateChanged, doc, getDoc, collection, query, where, getDocs, orderBy, limit, onSnapshot, ref, onValue, updateDoc, increment, addDoc } from './assets/js/firebase-config.js';

        let currentUser = null;
        let userData = null;
        let currentFilter = 'all';
        let tasks = [];

        // Check authentication
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData();
                loadTasks();
                loadAdminNotifications();
            } else {
                window.location.href = 'login.html';
            }
        });

        // Load user data
        async function loadUserData() {
            try {
                const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
                if (userDoc.exists()) {
                    userData = userDoc.data();
                    updateBalance();
                }
            } catch (error) {
                console.error('Error loading user:', error);
            }
        }

        // Update balance in UI
        function updateBalance() {
            const balanceEl = document.getElementById('balance');
            if (balanceEl) {
                balanceEl.textContent = `${userData?.balance || 0} ZMW`;
            }
        }

        // Load admin notifications
        function loadAdminNotifications() {
            const notificationsRef = ref(rtdb, 'admin-notifications');
            onValue(notificationsRef, (snapshot) => {
                const data = snapshot.val();
                const marquee = document.getElementById('notificationMarquee');
                if (marquee && data) {
                    const messages = Object.values(data).map(n => n.message).join(' | ');
                    marquee.textContent = messages || 'No notifications';
                }
            });
        }

        // Load tasks
        async function loadTasks() {
            try {
                const today = new Date().toISOString().split('T')[0];
                
                const tasksRef = collection(db, 'daily-tasks');
                const q = query(tasksRef, where('date', '==', today));
                const snapshot = await getDocs(q);
                
                tasks = [];
                snapshot.forEach(doc => {
                    tasks.push({ id: doc.id, ...doc.data() });
                });
                
                // If no tasks for today, load default tasks
                if (tasks.length === 0) {
                    tasks = getDefaultTasks();
                }
                
                displayTasks();
                
            } catch (error) {
                console.error('Error loading tasks:', error);
                tasks = getDefaultTasks();
                displayTasks();
            }
        }

        // Get default tasks (for demo)
        function getDefaultTasks() {
            return [
                {
                    id: '1',
                    platform: 'tiktok',
                    title: 'Watch TikTok Video',
                    description: 'Watch and engage with this TikTok video',
                    videoUrl: 'https://tiktok.com/@user/video/1',
                    action: 'Like, Comment, Share',
                    reward: 2,
                    maxPerDay: 10,
                    completed: 0
                },
                {
                    id: '2',
                    platform: 'facebook',
                    title: 'Watch Facebook Video',
                    description: 'Watch and react to this Facebook video',
                    videoUrl: 'https://facebook.com/watch/1',
                    action: 'Like, Share, Comment',
                    reward: 3,
                    maxPerDay: 8,
                    completed: 0
                },
                {
                    id: '3',
                    platform: 'youtube',
                    title: 'Watch YouTube Video',
                    description: 'Watch 2 minutes of this YouTube video',
                    videoUrl: 'https://youtube.com/watch?v=1',
                    action: 'Like, Subscribe, Comment',
                    reward: 4,
                    maxPerDay: 5,
                    completed: 0
                },
                {
                    id: '4',
                    platform: 'instagram',
                    title: 'Watch Instagram Reel',
                    description: 'Watch and engage with this Instagram Reel',
                    videoUrl: 'https://instagram.com/reel/1',
                    action: 'Like, Comment, Share',
                    reward: 2,
                    maxPerDay: 10,
                    completed: 0
                }
            ];
        }

        // Display tasks based on filter
        function displayTasks() {
            const container = document.getElementById('tasksContainer');
            if (!container) return;
            
            let filteredTasks = tasks;
            if (currentFilter !== 'all') {
                filteredTasks = tasks.filter(task => task.platform === currentFilter);
            }
            
            if (filteredTasks.length === 0) {
                container.innerHTML = `
                    <div class="no-tasks">
                        <i class="fas fa-tasks"></i>
                        <h3>No Tasks Available</h3>
                        <p>Check back later for new tasks</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filteredTasks.map(task => `
                <div class="task-card" data-platform="${task.platform}">
                    <div class="task-header">
                        <i class="fab fa-${task.platform} ${task.platform}"></i>
                        <span class="task-title">${task.title}</span>
                    </div>
                    
                    <p class="task-description">${task.description}</p>
                    
                    <div class="task-requirements">
                        <i class="fas fa-check-circle"></i> ${task.action}
                    </div>
                    
                    <div class="task-footer">
                        <span class="task-reward">${task.reward} ZMW</span>
                        <button onclick="startTask('${task.id}')" class="btn-start" id="btn-${task.id}">
                            Start Task
                        </button>
                    </div>
                    
                    <div class="daily-limit">
                        <i class="fas fa-clock"></i> Completed: ${task.completed || 0}/${task.maxPerDay || 10} today
                    </div>
                </div>
            `).join('');
        }

        // Start task
        window.startTask = async function(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            // Check daily limit
            if (task.completed >= task.maxPerDay) {
                alert('You have reached the daily limit for this task');
                return;
            }
            
            // Open video in new tab
            window.open(task.videoUrl, '_blank');
            
            // Show confirmation
            if (confirm('Did you complete the task? (Like, comment, share as required)')) {
                await completeTask(taskId);
            }
        };

        // Complete task
        async function completeTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            const btn = document.getElementById(`btn-${taskId}`);
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Processing...';
            }
            
            try {
                // Update task completion count
                task.completed = (task.completed || 0) + 1;
                
                // Add reward to user balance
                const userRef = doc(db, 'users', currentUser.uid);
                await updateDoc(userRef, {
                    balance: increment(task.reward),
                    totalEarned: increment(task.reward),
                    totalTasks: increment(1)
                });
                
                // Add to task history
                await addDoc(collection(db, 'users', currentUser.uid, 'task-history'), {
                    taskId: taskId,
                    platform: task.platform,
                    reward: task.reward,
                    completedAt: new Date().toISOString()
                });
                
                // Show success
                alert(`Task completed! You earned ${task.reward} ZMW`);
                
                // Update UI
                displayTasks();
                await loadUserData();
                
            } catch (error) {
                console.error('Error completing task:', error);
                alert('Failed to complete task. Please try again.');
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Start Task';
                }
            }
        }

        // Filter tasks
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.platform;
                displayTasks();
            });
        });

        // Show notifications
        window.showNotifications = function() {
            alert('Notifications panel - Coming soon');
        };
    </script>
</body>
</html>
