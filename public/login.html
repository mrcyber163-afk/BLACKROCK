<!-- public/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BlackRock</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .password-wrapper {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            cursor: pointer;
        }
        
        .toggle-password:hover {
            color: #00ff00;
        }
        
        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #888;
            cursor: pointer;
        }
        
        .checkbox-label input[type="checkbox"] {
            width: auto;
            accent-color: #00ff00;
        }
        
        .forgot-link {
            color: #00ff00;
            text-decoration: none;
            font-size: 14px;
        }
        
        .forgot-link:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .error-message i {
            margin-right: 8px;
        }
        
        .success-message {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <span class="black">BLACK</span><span class="green">ROCK</span>
            </div>
            
            <h2>Welcome Back!</h2>
            <p>Login to your account</p>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span></span>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="success-message">
                <i class="fas fa-check-circle"></i>
                <span></span>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <!-- Email -->
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                    </div>
                </div>

                <!-- Remember & Forgot -->
                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit" id="loginBtn">
                    Login <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Register Link -->
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register Here</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, 
            signInWithEmailAndPassword,
            doc,
            getDoc,
            onAuthStateChanged
        } from './assets/js/firebase-config.js';

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Check if user is admin
                checkUserRole(user);
            }
        });

        // Check user role
        async function checkUserRole(user) {
            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    
                    // Redirect based on role
                    if (userData.role === 'admin') {
                        window.location.href = 'admin/dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }
            } catch (error) {
                console.error('Error checking user role:', error);
            }
        }

        // Toggle password visibility
        window.togglePassword = function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            const icon = document.querySelector('.toggle-password');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        };

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const span = errorDiv.querySelector('span');
            span.textContent = message;
            errorDiv.style.display = 'flex';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            const span = successDiv.querySelector('span');
            span.textContent = message;
            successDiv.style.display = 'flex';
            
            // Auto hide after 3 seconds
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const loginBtn = document.getElementById('loginBtn');
            
            // Validate
            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            // Disable button
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            try {
                // Set persistence
                if (remember) {
                    await auth.setPersistence('local');
                } else {
                    await auth.setPersistence('session');
                }
                
                // Sign in
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Get user data
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    
                    // Check if account is active
                    if (userData.status === 'suspended') {
                        await auth.signOut();
                        showError('Your account has been suspended. Please contact support.');
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
                        return;
                    }
                    
                    if (userData.status === 'banned') {
                        await auth.signOut();
                        showError('Your account has been banned.');
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
                        return;
                    }
                    
                    if (userData.status === 'pending_activation') {
                        showSuccess('Please activate your account first. Redirecting...');
                        setTimeout(() => {
                            window.location.href = 'activation.html';
                        }, 2000);
                        return;
                    }
                    
                    // Update last login
                    await updateDoc(doc(db, 'users', user.uid), {
                        lastLogin: new Date().toISOString()
                    });
                    
                    showSuccess('Login successful! Redirecting...');
                    
                    // Redirect based on role
                    setTimeout(() => {
                        if (userData.role === 'admin') {
                            window.location.href = 'admin/dashboard.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1500);
                    
                } else {
                    showError('User data not found');
                    await auth.signOut();
                }
                
            } catch (error) {
                console.error('Login error:', error);
                
                let errorMessage = 'Login failed';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect password';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email format';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Too many failed attempts. Try again later';
                } else if (error.code === 'auth/user-disabled') {
                    errorMessage = 'This account has been disabled';
                }
                
                showError(errorMessage);
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
            }
        });

        // Add enter key support
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
