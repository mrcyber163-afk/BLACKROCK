<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BlackRock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
        }
        .auth-logo { text-align: center; margin-bottom: 30px; }
        .auth-logo .black { font-size: 32px; font-weight: 800; color: #fff; }
        .auth-logo .green { font-size: 32px; font-weight: 800; color: #0f0; }
        h2 { text-align: center; margin-bottom: 10px; }
        p { text-align: center; color: #888; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #fff; }
        .form-group label i { color: #0f0; margin-right: 8px; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
        }
        .form-group input:focus { outline: none; border-color: #0f0; }
        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
        }
        .forgot-password { text-align: right; margin: 10px 0; }
        .forgot-password a { color: #0f0; text-decoration: none; font-size: 14px; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #0f0;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #0c0; transform: translateY(-2px); }
        .auth-footer { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; }
        .auth-footer a { color: #0f0; text-decoration: none; }
        .notification-popup {
            position: fixed; top: 20px; right: 20px; background: #1a1a1a;
            border: 2px solid #0f0; border-radius: 10px; padding: 15px 25px;
            display: flex; align-items: center; gap: 15px; z-index: 1000;
            animation: slideIn 0.3s;
        }
        .notification-popup.error { border-color: #f44; }
        .notification-popup.warning { border-color: #fa0; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo"><span class="black">BLACK</span><span class="green">ROCK</span></div>
        <h2>Welcome Back!</h2>
        <p>Login to your account</p>
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                </div>
            </div>
            <div class="forgot-password"><a href="#" onclick="forgotPassword()">Forgot Password?</a></div>
            <button type="submit" class="btn-submit" id="loginBtn">Login <i class="fas fa-arrow-right"></i></button>
        </form>
        <div class="auth-footer"><p>Don't have an account? <a href="register.html">Register Here</a></p></div>
    </div>

    <script type="module">
        import { auth, db, signInWithEmailAndPassword, signOut, doc, getDoc, onAuthStateChanged } from './assets/js/firebase-config.js';

        window.togglePassword = function() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        };

        window.forgotPassword = () => alert('Password reset link sent to your email');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            
            if (!email || !password) { alert('Please fill all fields'); return; }
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                const userDoc = await getDoc(doc(db, 'users', userCred.user.uid));
                if (!userDoc.exists()) throw new Error('User not found');
                const userData = userDoc.data();
                
                if (userData.status === 'pending_activation') {
                    await signOut(auth);
                    alert('⚠️ Your account is pending activation. Please complete payment first.');
                    btn.disabled = false; btn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
                    return;
                }
                if (userData.status === 'suspended' || userData.status === 'banned') {
                    await signOut(auth);
                    alert('Your account has been ' + userData.status);
                    btn.disabled = false; btn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
                    return;
                }
                
                alert('Login successful! Redirecting...');
                window.location.href = 'dashboard.html';
            } catch (err) {
                alert(err.code === 'auth/user-not-found' ? 'Email not registered' : err.code === 'auth/wrong-password' ? 'Wrong password' : 'Login failed');
                btn.disabled = false; btn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
            }
        });
        
        onAuthStateChanged(auth, (user) => { if (user) window.location.href = 'dashboard.html'; });
    </script>
</body>
</html>
