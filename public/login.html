<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - BlackRock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
            margin: auto;
        }
        .auth-logo { text-align: center; margin-bottom: 30px; }
        .auth-logo .black { font-size: 32px; font-weight: 800; color: #fff; }
        .auth-logo .green { font-size: 32px; font-weight: 800; color: #0f0; }
        h2 { text-align: center; margin-bottom: 10px; }
        p { text-align: center; color: #888; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #fff; }
        .form-group label i { color: #0f0; margin-right: 8px; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
        }
        .form-group input:focus { outline: none; border-color: #0f0; }
        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
        }
        .forgot-password { text-align: right; margin: 10px 0; }
        .forgot-password a { color: #0f0; text-decoration: none; font-size: 14px; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #0f0;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #0c0; transform: translateY(-2px); }
        .auth-footer { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; }
        .auth-footer a { color: #0f0; text-decoration: none; }
        
        .custom-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .popup-content {
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 24px;
            padding: 30px 25px;
            max-width: 320px;
            width: 85%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }
        .popup-icon { font-size: 48px; margin-bottom: 15px; }
        .popup-icon.success { color: #0f0; }
        .popup-icon.error { color: #f44; }
        .popup-icon.warning { color: #ff0; }
        .popup-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .popup-message { color: #ccc; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }
        .popup-btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo"><span class="black">BLACK</span><span class="green">ROCK</span></div>
        <h2>Welcome Back!</h2>
        <p>Login to your account</p>
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                </div>
            </div>
            <div class="forgot-password"><a href="#" onclick="forgotPassword()">Forgot Password?</a></div>
            <button type="submit" class="btn-submit" id="loginBtn">Login <i class="fas fa-arrow-right"></i></button>
        </form>
        <div class="auth-footer"><p>Don't have an account? <a href="register.html">Register Here</a></p></div>
    </div>

    <script type="module">
        import { auth, db, signInWithEmailAndPassword, signOut, doc, getDoc, onAuthStateChanged } from './assets/js/firebase-config.js';

        function showPopup(title, message, type = 'success') {
            const existing = document.querySelector('.custom-popup');
            if (existing) existing.remove();
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
            const colors = { success: '#0f0', error: '#f44', warning: '#ff0' };
            const popup = document.createElement('div');
            popup.className = 'custom-popup';
            popup.innerHTML = `
                <div class="popup-content">
                    <div class="popup-icon ${type}"><i class="fas ${icons[type]}" style="color: ${colors[type]}"></i></div>
                    <div class="popup-title">${title}</div>
                    <div class="popup-message">${message}</div>
                    <button class="popup-btn" onclick="this.closest('.custom-popup').remove()">OK</button>
                </div>
            `;
            document.body.appendChild(popup);
        }

        window.togglePassword = function() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        };

        window.forgotPassword = () => showPopup('Reset Password', 'Password reset link has been sent to your email.', 'success');

        // LOGIN FORM SUBMIT
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            
            if (!email || !password) { showPopup('Error', 'Please fill in all fields', 'error'); return; }
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                const userDoc = await getDoc(doc(db, 'users', userCred.user.uid));
                if (!userDoc.exists()) throw new Error('User not found');
                const userData = userDoc.data();
                
                // IMPORTANT: Check if account is activated
                if (userData.status !== 'active') {
                    await signOut(auth);
                    showPopup('Account Not Activated', 'Your account is pending activation. Please complete the activation payment first.', 'warning');
                    btn.disabled = false; btn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
                    return;
                }
                if (userData.status === 'suspended') {
                    await signOut(auth);
                    showPopup('Account Suspended', 'Your account has been suspended. Contact support.', 'error');
                    btn.disabled = false; btn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
                    return;
                }
                
                showPopup('Login Successful', 'Welcome back! Redirecting to dashboard...', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
            } catch (err) {
                let msg = err.code === 'auth/user-not-found' ? 'Email not registered' : err.code === 'auth/wrong-password' ? 'Wrong password' : 'Login failed';
                showPopup('Login Failed', msg, 'error');
                btn.disabled = false; btn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
            }
        });
        
        // CHECK IF ALREADY LOGGED IN - IMPORTANT: This runs when page loads
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, 'users', user.uid));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        // Only redirect if account is ACTIVE
                        if (userData.status === 'active') {
                            window.location.href = 'dashboard.html';
                        } else {
                            // Account exists but not activated - force logout
                            await signOut(auth);
                            showPopup('Account Not Activated', 'Your account is pending activation. Please complete the activation payment first.', 'warning');
                        }
                    } else {
                        // User document doesn't exist - logout
                        await signOut(auth);
                    }
                } catch (error) {
                    console.error('Error checking user status:', error);
                    await signOut(auth);
                }
            }
        });
    </script>
</body>
</html>
