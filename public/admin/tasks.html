<!-- public/admin/tasks.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Tasks - BlackRock Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .btn-create {
            background: #00ff00;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        
        .btn-create:hover {
            background: #00cc00;
        }
        
        .tasks-table {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .table-header {
            display: grid;
            grid-template-columns: 0.5fr 1.5fr 2fr 1fr 1fr 1.5fr 1.5fr;
            padding: 15px;
            background: #333;
            color: #00ff00;
            font-weight: 600;
        }
        
        .task-row {
            display: grid;
            grid-template-columns: 0.5fr 1.5fr 2fr 1fr 1fr 1.5fr 1.5fr;
            padding: 15px;
            border-bottom: 1px solid #333;
            align-items: center;
        }
        
        .task-row:hover {
            background: rgba(0, 255, 0, 0.05);
        }
        
        .platform-badge {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            display: inline-block;
        }
        
        .platform-tiktok {
            background: rgba(0, 242, 234, 0.2);
            color: #00f2ea;
        }
        
        .platform-facebook {
            background: rgba(24, 119, 242, 0.2);
            color: #1877f2;
        }
        
        .platform-youtube {
            background: rgba(255, 0, 0, 0.2);
            color: #ff0000;
        }
        
        .platform-instagram {
            background: rgba(228, 64, 95, 0.2);
            color: #e4405f;
        }
        
        .status-badge {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .status-active {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
        }
        
        .status-inactive {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }
        
        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin: 0 2px;
        }
        
        .btn-edit {
            background: #00ff00;
            color: black;
        }
        
        .btn-delete {
            background: #ff4444;
            color: white;
        }
        
        .btn-toggle {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="admin-sidebar">
            <!-- ... sidebar content ... -->
        </div>

        <!-- Main Content -->
        <div class="admin-main">
            <div class="admin-header">
                <div class="header-title">
                    <h1>Manage Tasks</h1>
                    <p>Create and manage video tasks</p>
                </div>
            </div>

            <!-- Header with Create Button -->
            <div class="tasks-header">
                <div class="search-bar" style="max-width: 300px;">
                    <input type="text" placeholder="Search tasks...">
                </div>
                <button class="btn-create" onclick="showCreateTaskModal()">
                    <i class="fas fa-plus"></i> Create New Task
                </button>
            </div>

            <!-- Tasks Table -->
            <div class="tasks-table">
                <div class="table-header">
                    <span>ID</span>
                    <span>Platform</span>
                    <span>Title</span>
                    <span>Reward</span>
                    <span>Daily Limit</span>
                    <span>Status</span>
                    <span>Actions</span>
                </div>
                
                <div id="tasksList">
                    <div class="task-row">
                        <span>#001</span>
                        <span><span class="platform-badge platform-tiktok">TikTok</span></span>
                        <span>Watch TikTok Video</span>
                        <span>2 ZMW</span>
                        <span>10/day</span>
                        <span><span class="status-badge status-active">Active</span></span>
                        <td>
                            <button class="action-btn btn-edit" onclick="editTask('task1')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn btn-toggle" onclick="toggleTask('task1')">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="action-btn btn-delete" onclick="deleteTask('task1')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </div>
                    
                    <div class="task-row">
                        <span>#002</span>
                        <span><span class="platform-badge platform-facebook">Facebook</span></span>
                        <span>Watch Facebook Video</span>
                        <span>3 ZMW</span>
                        <span>8/day</span>
                        <span><span class="status-badge status-active">Active</span></span>
                        <td>
                            <button class="action-btn btn-edit" onclick="editTask('task2')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn btn-toggle" onclick="toggleTask('task2')">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="action-btn btn-delete" onclick="deleteTask('task2')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </div>
                    
                    <div class="task-row">
                        <span>#003</span>
                        <span><span class="platform-badge platform-youtube">YouTube</span></span>
                        <span>Watch YouTube Video</span>
                        <span>4 ZMW</span>
                        <span>5/day</span>
                        <span><span class="status-badge status-inactive">Inactive</span></span>
                        <td>
                            <button class="action-btn btn-edit" onclick="editTask('task3')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn btn-toggle" onclick="toggleTask('task3')">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="action-btn btn-delete" onclick="deleteTask('task3')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination">
                <button class="page-btn"><i class="fas fa-chevron-left"></i></button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <!-- Create/Edit Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content" style="max-width: 600px;">
            <h3 id="modalTitle">Create New Task</h3>
            
            <div class="form-group">
                <label>Platform</label>
                <select id="taskPlatform" class="form-control">
                    <option value="tiktok">TikTok</option>
                    <option value="facebook">Facebook</option>
                    <option value="youtube">YouTube</option>
                    <option value="instagram">Instagram</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Task Title</label>
                <input type="text" id="taskTitle" class="form-control" placeholder="e.g., Watch TikTok Video">
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="taskDescription" class="form-control" rows="3" placeholder="Task description..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Video URL</label>
                <input type="url" id="taskUrl" class="form-control" placeholder="https://...">
            </div>
            
            <div class="form-group">
                <label>Required Action</label>
                <input type="text" id="taskAction" class="form-control" placeholder="e.g., Like, Comment, Subscribe">
            </div>
            
            <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Reward (ZMW)</label>
                    <input type="number" id="taskReward" class="form-control" min="1" step="0.5">
                </div>
                
                <div class="form-group">
                    <label>Daily Limit</label>
                    <input type="number" id="taskLimit" class="form-control" min="1" value="10">
                </div>
            </div>
            
            <div class="form-group">
                <label>Status</label>
                <select id="taskStatus" class="form-control">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-submit" onclick="saveTask()">Save Task</button>
                <button class="btn-outline" onclick="closeTaskModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let editingTaskId = null;

        function showCreateTaskModal() {
            editingTaskId = null;
            document.getElementById('modalTitle').textContent = 'Create New Task';
            document.getElementById('taskModal').classList.add('active');
            
            // Clear form
            document.getElementById('taskPlatform').value = 'tiktok';
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDescription').value = '';
            document.getElementById('taskUrl').value = '';
            document.getElementById('taskAction').value = '';
            document.getElementById('taskReward').value = '';
            document.getElementById('taskLimit').value = '10';
            document.getElementById('taskStatus').value = 'active';
        }

        function editTask(taskId) {
            editingTaskId = taskId;
            document.getElementById('modalTitle').textContent = 'Edit Task';
            document.getElementById('taskModal').classList.add('active');
            
            // Load task data (simulated)
            document.getElementById('taskPlatform').value = 'tiktok';
            document.getElementById('taskTitle').value = 'Watch TikTok Video';
            document.getElementById('taskDescription').value = 'Watch and engage with TikTok video';
            document.getElementById('taskUrl').value = 'https://tiktok.com/@user/video/123';
            document.getElementById('taskAction').value = 'Like, Comment, Share';
            document.getElementById('taskReward').value = '2';
            document.getElementById('taskLimit').value = '10';
            document.getElementById('taskStatus').value = 'active';
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('active');
        }

        function saveTask() {
            const platform = document.getElementById('taskPlatform').value;
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDescription').value;
            const url = document.getElementById('taskUrl').value;
            const action = document.getElementById('taskAction').value;
            const reward = document.getElementById('taskReward').value;
            const limit = document.getElementById('taskLimit').value;
            
            if (!title || !description || !url || !action || !reward) {
                alert('Please fill all fields');
                return;
            }
            
            alert(editingTaskId ? 'Task updated successfully!' : 'Task created successfully!');
            closeTaskModal();
        }

        function toggleTask(taskId) {
            alert('Task status toggled');
        }

        function deleteTask(taskId) {
            if (confirm('Are you sure you want to delete this task?')) {
                alert('Task deleted');
            }
        }
    </script>
    <script type="module" src="../assets/js/admin/admin-tasks.js"></script>
</body>
</html>
