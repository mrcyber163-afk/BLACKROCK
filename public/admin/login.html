<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - BlackRock</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-badge {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo"><span class="black">BLACK</span><span class="green">ROCK</span></div>
            <div class="admin-badge"><i class="fas fa-crown"></i> Admin Portal</div>
            <h2>Administrator Login</h2>
            <p>Secure access for administrators only</p>
            <form id="adminLoginForm">
                <div class="form-group"><label><i class="fas fa-envelope"></i> Admin Email</label><input type="email" id="email" placeholder="admin@blackrock.com" required value="mrcyber163@gmail.com"></div>
                <div class="form-group"><label><i class="fas fa-lock"></i> Password</label><div class="password-wrapper"><input type="password" id="password" placeholder="Enter password" required><i class="fas fa-eye toggle-password" onclick="togglePassword()"></i></div></div>
                <button type="submit" class="btn-submit" id="loginBtn"><i class="fas fa-lock-open"></i> Access Admin Panel</button>
            </form>
            <div class="auth-footer"><p><a href="../login.html"><i class="fas fa-arrow-left"></i> Back to User Login</a></p></div>
        </div>
    </div>
    <script type="module">
        import { auth, signInWithEmailAndPassword, doc, getDoc } from '../assets/js/firebase-config.js';
        function togglePassword() { const input = document.getElementById('password'); input.type = input.type === 'password' ? 'text' : 'password'; }
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value, password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                const userDoc = await getDoc(doc(db, 'users', userCred.user.uid));
                if (!userDoc.exists() || userDoc.data().role !== 'admin') throw new Error('Not an admin account');
                alert('Admin login successful!');
                window.location.href = 'dashboard.html';
            } catch (err) { alert('Invalid admin credentials'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-lock-open"></i> Access Admin Panel'; }
        });
    </script>
</body>
</html>
