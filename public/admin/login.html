<!-- public/admin/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - BlackRock</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin-login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-card">
            <!-- Logo -->
            <div class="admin-login-logo">
                <span class="black">BLACK</span><span class="green">ROCK</span>
                <span class="admin-badge">ADMIN</span>
            </div>
            
            <h2>Admin Access</h2>
            <p>Secure administrator login</p>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span></span>
            </div>

            <!-- Login Form -->
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Admin Email
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="admin@blackrock.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter admin password"
                            required
                        >
                        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                    </div>
                </div>

                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    Access Admin Panel <i class="fas fa-lock-open"></i>
                </button>
            </form>

            <div class="security-note">
                <i class="fas fa-shield-alt"></i>
                <p>This area is restricted to authorized administrators only. All actions are logged.</p>
            </div>

            <div class="back-link">
                <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Main Site</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, 
            db,
            signInWithEmailAndPassword,
            doc,
            getDoc
        } from '../assets/js/firebase-config.js';

        // Toggle password visibility
        window.togglePassword = function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            
            const icon = document.querySelector('.toggle-password');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        };

        // Show error
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.querySelector('span').textContent = message;
            errorDiv.style.display = 'flex';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Handle login
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                showError('Please enter email and password');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            
            try {
                // Set persistence
                if (remember) {
                    await auth.setPersistence('local');
                } else {
                    await auth.setPersistence('session');
                }
                
                // Sign in
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Check if admin
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                
                if (!userDoc.exists() || userDoc.data().role !== 'admin') {
                    await auth.signOut();
                    showError('Access denied. Admin privileges required.');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Access Admin Panel <i class="fas fa-lock-open"></i>';
                    return;
                }
                
                // Redirect to admin dashboard
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error('Login error:', error);
                
                let errorMessage = 'Login failed';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'Admin account not found';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect password';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email format';
                }
                
                showError(errorMessage);
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Access Admin Panel <i class="fas fa-lock-open"></i>';
            }
        });
    </script>
    <script type="module" src="../assets/js/admin/admin-login.js"></script>
</body>
</html>
