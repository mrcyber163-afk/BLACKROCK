<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - BlackRock</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000 0%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #0a0a0a;
            border: 1px solid #00ff00;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-logo .black { font-size: 32px; font-weight: 800; color: #fff; }
        .auth-logo .green { font-size: 32px; font-weight: 800; color: #00ff00; }
        .admin-badge {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
        }
        h2 { text-align: center; color: #fff; margin-bottom: 10px; }
        p { text-align: center; color: #888; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #fff; }
        .form-group label i { color: #00ff00; margin-right: 8px; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
        }
        .form-group input:focus { outline: none; border-color: #00ff00; }
        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #00ff00;
            border: none;
            border-radius: 8px;
            color: black;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover { background: #00cc00; transform: translateY(-2px); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .auth-footer { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; }
        .auth-footer a { color: #00ff00; text-decoration: none; }
        .notification-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1a1a1a;
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .demo-credentials {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 10px;
            text-align: center;
        }
        .demo-credentials p { margin-bottom: 5px; color: #00ff00; font-size: 12px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <span class="black">BLACK</span><span class="green">ROCK</span>
        </div>
        
        <div style="text-align: center;">
            <div class="admin-badge">
                <i class="fas fa-crown"></i> Admin Portal
            </div>
        </div>
        
        <h2>Administrator Login</h2>
        <p>Secure access for administrators only</p>

        <form id="adminLoginForm">
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i>
                    Admin Email
                </label>
                <input type="email" id="email" placeholder="admin@blackrock.com" required>
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i>
                    Password
                </label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter password" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="loginBtn">
                <i class="fas fa-lock-open"></i> Access Admin Panel
            </button>
        </form>

        <div class="demo-credentials">
            <p>Demo Admin Credentials</p>
            <p style="color: #00ff00;">mrcyber163@gmail.com / Deo@2024</p>
        </div>

        <div class="auth-footer">
            <p><a href="../login.html"><i class="fas fa-arrow-left"></i> Back to User Login</a></p>
        </div>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword } from '../assets/js/firebase-config.js';

        window.togglePassword = function() {
            const input = document.getElementById('password');
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            const icon = document.querySelector('.toggle-password');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        };

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                showNotification('Please fill all fields', 'error');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            
            try {
                // Kwanza login kwa Firebase Auth
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Hardcoded admin check (kwa sasa)
                if (email === 'mrcyber163@gmail.com') {
                    localStorage.setItem('adminLoggedIn', 'true');
                    localStorage.setItem('adminEmail', email);
                    showNotification('Admin login successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showNotification('Not an admin account. Use: mrcyber163@gmail.com', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-lock-open"></i> Access Admin Panel';
                }
                
            } catch (error) {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-lock-open"></i> Access Admin Panel';
                
                let message = 'Login failed';
                if (error.code === 'auth/user-not-found') message = 'Admin account not found';
                else if (error.code === 'auth/wrong-password') message = 'Wrong password';
                else if (error.code === 'auth/invalid-email') message = 'Invalid email';
                else message = error.message;
                
                showNotification(message, 'error');
            }
        });
        
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = 'notification-popup';
            notification.style.borderColor = type === 'success' ? '#00ff00' : '#ff4444';
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}" style="color: ${type === 'success' ? '#00ff00' : '#ff4444'}"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
    </script>
</body>
</html>
