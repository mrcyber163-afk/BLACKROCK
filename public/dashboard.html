<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BlackRock</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            padding: 20px;
        }
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: #0a0a0a;
            border: 1px solid #00ff00;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .welcome {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .welcome span {
            color: #00ff00;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #00ff00;
        }
        .btn-logout {
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-logout:hover {
            background: #cc0000;
        }
        .admin-link {
            background: #00ff00;
            color: black;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div class="welcome">
                Welcome, <span id="userEmail">User</span>!
            </div>
            <p>Today is <span id="currentDate"></span></p>
            <a href="admin/login.html" class="admin-link" id="adminLink" style="display: none;">
                <i class="fas fa-crown"></i> Go to Admin Panel
            </a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div>
                    <div style="color: #888;">Balance</div>
                    <div class="stat-value" id="balance">0 ZMW</div>
                </div>
                <i class="fas fa-wallet" style="font-size: 40px; color: #00ff00;"></i>
            </div>
            <div class="stat-card">
                <div>
                    <div style="color: #888;">Total Earned</div>
                    <div class="stat-value" id="totalEarned">0 ZMW</div>
                </div>
                <i class="fas fa-chart-line" style="font-size: 40px; color: #00ff00;"></i>
            </div>
            <div class="stat-card">
                <div>
                    <div style="color: #888;">Tasks Done</div>
                    <div class="stat-value" id="tasksDone">0</div>
                </div>
                <i class="fas fa-tasks" style="font-size: 40px; color: #00ff00;"></i>
            </div>
        </div>

        <button class="btn-logout" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, signOut, doc, getDoc } from './assets/js/firebase-config.js';

        // Set current date
        const today = new Date();
        document.getElementById('currentDate').textContent = today.toLocaleDateString('en-ZM', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });

        // Check if user is logged in
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('userEmail').textContent = user.email;
            
            // Load user data from Firestore
            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    document.getElementById('balance').textContent = (userData.balance || 0) + ' ZMW';
                    document.getElementById('totalEarned').textContent = (userData.totalEarned || 0) + ' ZMW';
                    document.getElementById('tasksDone').textContent = userData.totalTasks || 0;
                    
                    // Show admin link if user is admin
                    if (userData.role === 'admin') {
                        document.getElementById('adminLink').style.display = 'inline-block';
                    }
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        });

        window.logout = async function() {
            await signOut(auth);
            window.location.href = 'login.html';
        };
    </script>
</body>
</html>
