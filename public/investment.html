<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment - BlackRock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
        }
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: #0a0a0a;
            border-right: 1px solid #0f0;
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .logo { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .logo .black { font-size: 24px; font-weight: 800; color: #fff; }
        .logo .green { font-size: 24px; font-weight: 800; color: #0f0; }
        .nav-menu a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: #888;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.3s;
        }
        .nav-menu a i { width: 20px; color: #0f0; }
        .nav-menu a:hover { background: rgba(0,255,0,0.1); color: #fff; }
        .nav-menu a.active { background: #0f0; color: #000; }
        .main-content { flex: 1; margin-left: 280px; padding: 20px; }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .user-balance { background: #0f0; color: #000; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
        .btn-section { text-align: center; margin: 30px 0; display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .invest-btn {
            background: transparent;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 15px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
        }
        .invest-btn:hover { background: #0f0; color: #000; transform: translateY(-2px); }
        .wealth-btn { border-color: #ffd700; color: #ffd700; }
        .wealth-btn:hover { background: #ffd700; color: #000; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0a0a0a;
            border: 2px solid #0f0;
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        .modal-header h3 { color: #0f0; }
        .close-modal { font-size: 28px; cursor: pointer; color: #888; transition: 0.3s; }
        .close-modal:hover { color: #f44; }
        .vip-grid, .wealth-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .vip-card, .wealth-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            transition: 0.3s;
        }
        .vip-card:hover, .wealth-card:hover { border-color: #0f0; transform: translateY(-3px); }
        .vip-card h4 { font-size: 24px; color: #0f0; margin-bottom: 10px; }
        .vip-card .capital { font-size: 24px; color: #ffd700; font-weight: bold; margin: 10px 0; }
        .wealth-card h4 { color: #ffd700; font-size: 20px; }
        .wealth-card .duration { color: #888; margin: 5px 0; }
        .wealth-card .capital { font-size: 22px; color: #fff; font-weight: bold; margin: 10px 0; }
        .wealth-card .returns { color: #0f0; font-size: 18px; margin: 10px 0; }
        .btn-closed { background: #333; color: #888; border: none; padding: 10px; border-radius: 5px; cursor: not-allowed; width: 100%; margin-top: 15px; }
        .invest-small-btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: 0.3s;
        }
        .invest-small-btn:hover { background: #0c0; transform: translateY(-2px); }
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0a0a0a;
            border-top: 1px solid #0f0;
            padding: 10px;
            justify-content: space-around;
            z-index: 100;
        }
        .mobile-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #888;
            font-size: 12px;
        }
        .mobile-nav a i { font-size: 20px; margin-bottom: 5px; }
        .mobile-nav a.active { color: #0f0; }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding-bottom: 80px; }
            .mobile-nav { display: flex; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <div class="logo"><span class="black">BLACK</span><span class="green">ROCK</span></div>
            <nav class="nav-menu">
                <a href="dashboard.html"><i class="fas fa-home"></i> Home</a>
                <a href="tasks.html"><i class="fas fa-tasks"></i> Tasks</a>
                <a href="deposit.html"><i class="fas fa-plus-circle"></i> Deposit</a>
                <a href="withdraw.html"><i class="fas fa-wallet"></i> Withdraw</a>
                <a href="transaction-history.html"><i class="fas fa-history"></i> History</a>
                <a href="referral.html"><i class="fas fa-users"></i> Referrals</a>
                <a href="investment.html" class="active"><i class="fas fa-chart-line"></i> Investment</a>
                <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
                <a href="welcome-bonus.html"><i class="fas fa-gift"></i> Bonus</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="dashboard-header">
                <div><h2>Investment Center</h2><p>Grow your wealth with 4% daily returns</p></div>
                <div class="user-balance"><strong id="balance">0 ZMW</strong></div>
            </div>

            <div class="btn-section">
                <button class="invest-btn" onclick="openVIPModal()"><i class="fas fa-crown"></i> VIP Levels (4% Daily)</button>
                <button class="invest-btn wealth-btn" onclick="openWealthModal()"><i class="fas fa-chart-line"></i> Wealth Fund Plans</button>
            </div>
        </div>

        <div class="mobile-nav">
            <a href="dashboard.html"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="welcome-bonus.html"><i class="fas fa-gift"></i><span>Bonus</span></a>
            <a href="investment.html" class="active"><i class="fas fa-chart-line"></i><span>VIP</span></a>
            <a href="referral.html"><i class="fas fa-users"></i><span>Team</span></a>
            <a href="profile.html"><i class="fas fa-user"></i><span>Profile</span></a>
        </div>
    </div>

    <div class="modal" id="vipModal">
        <div class="modal-content">
            <div class="modal-header"><h3><i class="fas fa-crown"></i> VIP Levels - 4% Daily Returns</h3><span class="close-modal" onclick="closeVIPModal()">&times;</span></div>
            <div class="vip-grid" id="vipGrid"></div>
        </div>
    </div>

    <div class="modal" id="wealthModal">
        <div class="modal-content">
            <div class="modal-header"><h3><i class="fas fa-chart-line"></i> Wealth Fund Plans - Lock & Earn</h3><span class="close-modal" onclick="closeWealthModal()">&times;</span></div>
            <div class="wealth-grid" id="wealthGrid"></div>
        </div>
    </div>

    <script type="module">
        import { auth, db, doc, getDoc, onAuthStateChanged } from './assets/js/firebase-config.js';

        const vipLevels = [
            { level:1, min:100, dailyPercent:4, videos:5, status:'open' },
            { level:2, min:500, dailyPercent:4, videos:8, status:'open' },
            { level:3, min:1000, dailyPercent:4, videos:12, status:'open' },
            { level:4, min:5000, dailyPercent:4, videos:20, status:'open' },
            { level:5, min:8000, dailyPercent:4, videos:30, status:'open' },
            { level:6, min:10000, dailyPercent:4, videos:40, status:'open' },
            { level:7, min:25000, dailyPercent:4, videos:60, status:'open' },
            { level:8, min:45000, dailyPercent:4, videos:80, status:'closed' },
            { level:9, min:65000, dailyPercent:4, videos:100, status:'closed' },
            { level:10, min:100000, dailyPercent:4, videos:150, status:'closed' }
        ];

        const wealthPlans = [
            { name:"Silver Plan", capital:1000, duration:60, returns:180, total:2800 },
            { name:"Gold Plan", capital:1500, duration:90, returns:240, total:5100 },
            { name:"Platinum Plan", capital:3000, duration:180, returns:320, total:12600 },
            { name:"Diamond Plan", capital:5000, duration:270, returns:300, total:20000 },
            { name:"Royal Plan", capital:10000, duration:320, returns:1000, total:110000 }
        ];

        function renderVIP() {
            document.getElementById('vipGrid').innerHTML = vipLevels.map(v => `
                <div class="vip-card">
                    <h4>VIP ${v.level}</h4>
                    <div class="capital">${v.min.toLocaleString()} ZMW</div>
                    <div>📈 Daily: ${v.dailyPercent}% (${(v.min * v.dailyPercent / 100).toFixed(2)} ZMW)</div>
                    <div>🎬 Videos: ${v.videos} per day</div>
                    <div>📅 Monthly: ${(v.min * v.dailyPercent / 100 * 30).toFixed(2)} ZMW</div>
                    ${v.status === 'closed' 
                        ? '<button class="btn-closed" disabled>🔒 Coming Soon</button>'
                        : `<button class="invest-small-btn" onclick="alert('VIP ${v.level} investment requires ${v.min} ZMW. Contact admin to invest.')">Invest Now</button>`}
                </div>
            `).join('');
        }

        function renderWealth() {
            document.getElementById('wealthGrid').innerHTML = wealthPlans.map(p => `
                <div class="wealth-card">
                    <h4>${p.name}</h4>
                    <div class="duration">📅 ${p.duration} Days Lock Period</div>
                    <div class="capital">💰 ${p.capital.toLocaleString()} ZMW</div>
                    <div class="returns">+${p.returns}% Returns</div>
                    <div>💵 Total: ${p.total.toLocaleString()} ZMW</div>
                    <button class="invest-small-btn" onclick="alert('${p.name} requires ${p.capital} ZMW. Contact admin to invest.')">Invest Now</button>
                </div>
            `).join('');
        }

        window.openVIPModal = () => { renderVIP(); document.getElementById('vipModal').classList.add('active'); };
        window.closeVIPModal = () => document.getElementById('vipModal').classList.remove('active');
        window.openWealthModal = () => { renderWealth(); document.getElementById('wealthModal').classList.add('active'); };
        window.closeWealthModal = () => document.getElementById('wealthModal').classList.remove('active');

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) document.getElementById('balance').innerHTML = (userDoc.data().balance || 0) + ' ZMW';
        });

        window.logout = async () => { await auth.signOut(); window.location.href = 'login.html'; };
    </script>
</body>
</html>
